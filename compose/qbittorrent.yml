version: '3'
services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /mnt/HDD/qbittorrent/config:/config
      - /mnt/HDD/samba:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

    # El usuario por defecto es admin; la contraseña temporal se genera
    # en el log del contenedor la primera vez que arranca
    # (docker logs qbittorrent | grep -i password).
