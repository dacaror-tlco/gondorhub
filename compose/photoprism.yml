version: "3.8"
services:
  photoprism-mariadb:
    image: mariadb:11
    container_name: photoprism-mariadb
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: photoprism
      MARIADB_USER: photoprism
      MARIADB_PASSWORD: ${PHOTOPRISM_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${PHOTOPRISM_DB_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${DATA_PATH}/photoprism-mariadb:/var/lib/mysql
    command: mariadbd --innodb-buffer-pool-size=256M --transaction-isolation=READ-COMMITTED --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512 --innodb-rollback-on-timeout=OFF --innodb-lock-wait-timeout=120

  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: unless-stopped
    depends_on:
      - photoprism-mariadb
    ports:
      - "2342:2342"            # web UI en http://localhost:2342
    environment:
      PHOTOPRISM_ADMIN_PASSWORD: ${PHOTOPRISM_ADMIN_PASSWORD}
      PHOTOPRISM_HTTP_PORT: 2342
      PHOTOPRISM_DETECT_NSFW: "true"
      PHOTOPRISM_ORIGINALS_LIMIT: 0
      PHOTOPRISM_DISABLE_FACES: "true"
      TZ: ${TZ}
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "photoprism-mariadb:3306"
      PHOTOPRISM_DATABASE_NAME: "photoprism"
      PHOTOPRISM_DATABASE_USER: "photoprism"
      PHOTOPRISM_DATABASE_PASSWORD: ${PHOTOPRISM_DB_PASSWORD}
    volumes:
      - ${NEXTCLOUD_PHOTOS_PATH}:/photoprism/originals     # carpeta de fotos, montada desde Nextcloud
      - ${DATA_PATH}/photoprism/storage:/photoprism/storage   # cache, miniaturas, sidecar files
