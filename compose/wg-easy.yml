version: "3.8"

services:
  wg-easy:
    environment:
      # ⚠️ Hostname al que conectan los clientes WireGuard (tu IP fija o dominio):
      - WG_HOST=${DDNS_HOSTNAME}

      # ⚠️ Hash bcrypt de la contraseña del panel web (generar con: docker run --rm ghcr.io/wg-easy/wg-easy wgpw 'tu_password'):
      - PASSWORD_HASH=${WG_PASSWORD_HASH}

      # IP del contenedor Pi-hole dentro de la red interna wg-easy:
      - WG_DEFAULT_DNS=172.26.0.3
      - WG_DEFAULT_ADDRESS=192.168.192.x
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    volumes:
      - /mnt/HDD/wireguard:/config
    ports:
      - "51820:51820/udp"   # Puerto UDP de WireGuard — debe seguir abierto en el router
      - "51821:51821/tcp"   # Panel web de wg-easy — NPM lo expondrá por vpn.${DOMAIN}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      wg-easy:
        ipv4_address: 172.26.0.2


  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"         # DNS TCP — necesario para que Pi-hole funcione como DNS
      - "53:53/udp"         # DNS UDP — ídem
      # - "67:67/udp"       # Solo si usas Pi-hole como servidor DHCP
      - "8082:80/tcp"       # Puerto externo cambiado: NPM usará el 80 y 443 públicos
                            # NPM enrutará admin.${DOMAIN} → localhost:8082
    environment:
      TZ: 'Europe/Madrid'
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
    volumes:
      - './etc-pihole:/etc/pihole'
      - './etc-dnsmasq.d:/etc/dnsmasq.d'
    restart: unless-stopped
    networks:
      wg-easy:
        ipv4_address: 172.26.0.3

networks:
  wg-easy:
    ipam:
      config:
        - subnet: 172.26.0.0/24

# NOTA: esta es una segunda instancia de Pi-hole, dedicada exclusivamente a resolver
# DNS para los clientes conectados por WireGuard (red interna 172.26.0.0/24).
# Es independiente del Pi-hole "principal" definido en pihole.yml.
